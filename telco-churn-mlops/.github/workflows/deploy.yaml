name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Ruta corregida: carpeta/archivo
          pip install -r telco-churn-mlops/requirements.txt

      - name: Build the book
        # Ruta corregida: construye lo que hay dentro de la subcarpeta
        run: jupyter-book build telco-churn-mlops/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ruta corregida: donde se genera el HTML
          path: "telco-churn-mlops/_build/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4