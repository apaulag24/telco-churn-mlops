name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r telco-churn-mlops/requirements.txt

      - name: Build the book
        # Como el archivo está en la raíz, le decimos que entre a la carpeta del proyecto
        run: jupyter-book build telco-churn-mlops/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # La salida siempre estará dentro de la carpeta del proyecto
          path: "telco-churn-mlops/_build/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4