name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter-book myst-nb pandas numpy matplotlib seaborn scikit-learn xgboost catboost lightgbm pyarrow fastparquet

      - name: Build
        run: |
          rm -f myst.yml
          jupyter-book build .
          
          # Buscamos CUALQUIER carpeta que se llame 'html' o 'site' dentro de _build
          # y la movemos a una carpeta fija llamada 'publico'
          mkdir -p publico
          CONSTRUIDO=$(find _build -type d \( -name "html" -o -name "site" \) | head -n 1)
          echo "Carpeta encontrada en: $CONSTRUIDO"
          cp -r $CONSTRUIDO/. publico/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "publico"

      - name: Deploy
        uses: actions/deploy-pages@v4
