name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter-book myst-nb pandas numpy matplotlib seaborn scikit-learn xgboost catboost lightgbm pyarrow fastparquet

      - name: Build the book
        run: |
          # 1. Buscamos la carpeta exacta que contiene el _config.yml
          CONFIG_DIR=$(find . -name "_config.yml" -exec dirname {} \; | head -n 1)
          echo "Proyecto encontrado en: $CONFIG_DIR"
          
          # 2. Construimos el libro directamente ahí
          jupyter-book build "$CONFIG_DIR"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 3. Buscamos la carpeta de salida generada, no importa la ruta
          path: "**/_build/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
