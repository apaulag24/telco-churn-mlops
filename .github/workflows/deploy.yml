name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter-book myst-nb pandas numpy matplotlib seaborn scikit-learn xgboost catboost lightgbm pyarrow fastparquet

      - name: Build the book
        run: |
          # 1. Creamos un espacio de trabajo limpio
          mkdir workspace
          
          # 2. Copiamos los archivos esenciales ignorando la carpeta problemática
          # (Asegúrate de que estos nombres coincidan con los que vimos en tu ls -R)
          cp _config.yml _toc.yml intro.md requirements.txt workspace/ 2>/dev/null || true
          cp -r notebooks workspace/ 2>/dev/null || true
          cp -r data workspace/ 2>/dev/null || true
          cp -r src workspace/ 2>/dev/null || true
          
          # 3. Entramos al espacio limpio y construimos
          cd workspace
          # Forzamos el build ignorando cualquier rastro de 'myst.yml'
          jupyter-book build . --all
          
          # 4. Movemos el resultado a una ruta que GitHub pueda ver
          cd ..
          mkdir -p final_output
          cp -r workspace/_build/html/. final_output/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Esta ruta ahora es 100% segura
          path: "final_output"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
