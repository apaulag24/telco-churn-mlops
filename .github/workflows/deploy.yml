name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter-book myst-nb pandas numpy matplotlib seaborn scikit-learn xgboost catboost lightgbm pyarrow fastparquet

      - name: Build and Locate
        run: |
          # 1. Limpieza total de archivos de conflicto
          rm -f myst.yml
          
          # 2. Construcción forzada
          jupyter-book build . --all
          
          # 3. EL RASTREADOR: Buscamos cualquier archivo 'index.html' generado
          # y copiamos su carpeta contenedora a una carpeta llamada 'entregable'
          mkdir -p entregable
          RUTA_HTML=$(find _build -name "index.html" -exec dirname {} \; | head -n 1)
          
          if [ -z "$RUTA_HTML" ]; then
            echo "ERROR: No se encontró ningún archivo HTML generado."
            exit 1
          else
            echo "¡Lo encontramos en: $RUTA_HTML!"
            cp -r "$RUTA_HTML"/. entregable/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Esta carpeta la creamos nosotros, no puede fallar
          path: "entregable"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
