name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter-book myst-nb pandas numpy matplotlib seaborn scikit-learn xgboost catboost lightgbm pyarrow fastparquet

      - name: Build the book
        run: |
          # Buscamos el proyecto y construimos
          CONFIG_DIR=$(find . -name "_config.yml" -exec dirname {} \; | head -n 1)
          jupyter-book build "$CONFIG_DIR"
          
          # Movemos el resultado a una carpeta fija para que no falle el Upload
          mkdir -p final_book
          cp -r "$CONFIG_DIR/_build/html/." final_book/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Usamos la carpeta fija que acabamos de crear
          path: "final_book"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
