name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter-book myst-nb pandas numpy matplotlib seaborn scikit-learn xgboost catboost lightgbm pyarrow fastparquet

      - name: Build the book
        run: |
          # 1. ELIMINAMOS EL CONFLICTO DE NOMBRES
          # Cambiamos el nombre de la subcarpeta para que no se llame igual que el repo
          mv telco-churn-mlops carpeta_datos
          
          # 2. Borramos el archivo que activa a 'myst' para que solo use Jupyter Book
          rm -f myst.yml
          
          # 3. Construimos el libro en la raíz
          jupyter-book build . --all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_build/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
