name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter-book myst-nb pandas numpy matplotlib seaborn scikit-learn xgboost catboost lightgbm pyarrow fastparquet

      - name: Build the book
        run: |
          # 1. Buscamos donde está el _config.yml
          CONFIG_DIR=$(find . -name "_config.yml" -exec dirname {} \; | head -n 1)
          
          # 2. Movemos TODO el contenido de esa carpeta a la raíz del servidor
          # Esto elimina el problema de las carpetas anidadas
          cp -r $CONFIG_DIR/* .
          
          # 3. Construimos el libro aquí mismo en la raíz
          python -m jupyter_book build .

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ahora el resultado está garantizado en la raíz
          path: "_build/html"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
