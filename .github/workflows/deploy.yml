name: Deploy MyST Book to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar myst-cli
        run: npm install -g mystmd

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install \
            jupyter \
            ipykernel \
            nbformat \
            nbconvert \
            scikit-learn \
            pandas \
            numpy \
            matplotlib \
            seaborn \
            plotly \
            xgboost \
            catboost \
            lightgbm \
            imbalanced-learn \
            shap \
            lime
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt || true
          fi

      - name: Registrar kernel Python
        run: |
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Construir con MyST
        run: |
          cd $GITHUB_WORKSPACE
          myst build --html 2>&1 | tee /tmp/myst_build.log
          echo "--- Fin del log ---"

      - name: Verificar salida del build
        run: |
          if [ -d "_build/html" ]; then
            echo "✅ Carpeta _build/html encontrada."
            ls -la _build/html/
          else
            echo "❌ ERROR: No se encontró _build/html"
            ls -la _build/ 2>/dev/null || echo "(vacía o inexistente)"
            tail -60 /tmp/myst_build.log
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_build/html"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
