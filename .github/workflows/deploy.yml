name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Terminal PowerShell (ls -R)
        run: |
          echo "=== DÓNDE ESTOY PARADO? ==="
          pwd
          echo "=== QUÉ HAY EN ESTA CARPETA? ==="
          ls -F
          echo "=== MAPA COMPLETO DE ARCHIVOS ==="
          ls -R
