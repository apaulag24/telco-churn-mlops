name: deploy-book

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install jupyter-book myst-nb pandas numpy matplotlib seaborn scikit-learn xgboost catboost lightgbm pyarrow fastparquet

      - name: Build
        run: |
          # Buscamos el lugar exacto del config y construimos solo ahí
          # Usamos -maxdepth para que no busque infinitamente en subcarpetas
          CONF=$(find . -maxdepth 3 -name "_config.yml" -exec dirname {} \; | head -n 1)
          jupyter-book build "$CONF"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "**/_build/html"

      - name: Deploy
        uses: actions/deploy-pages@v4
